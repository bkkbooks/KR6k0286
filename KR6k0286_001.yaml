body:
  text: 釋弘一初禮敬三寶一心敬禮過去世盡過去際一切佛一心敬禮未來世盡未來際一切佛一心敬禮現在世盡現在際一切佛一心敬禮過去世盡過去際一切法一心敬禮未來世盡未來際一切法一心敬禮現在世盡現在際一切法一心敬禮過去世盡過去際一切僧一心敬禮未來世盡未來際一切僧一心敬禮現在世盡現在際一切僧二受四依從今時盡未來際身歸依佛歸依法歸依賢聖僧歸依法戒三説三悔罪若現在身口意十惡罪願畢竟不起盡未來際若未來身口意十惡罪願畢竟不起盡未來際若過去身口意十惡罪願畢竟不起盡未來際如是悔過已三業清淨如淨琉璃內外明照案此亦應三説發四弘誓願四自誓受戒我某甲白十方佛及大地菩薩等我學菩薩五重戒三説五説戒相從今身至佛身盡未來際於其中間不得故殺生若有犯非菩薩行失四十二賢聖法不得犯能持否能從今身至佛身盡未來際於其中間不得故妄語若有犯非菩薩行失四十二賢聖法不得犯能持否能從今身至佛身盡未來際於其中間不得故淫若有犯非菩薩行失四十二賢聖法不得犯能持否能從今身至佛身盡未來際於其中間不得故盜若有犯非菩薩行失四十二賢聖法不得犯能持否能從今身至佛身盡未來際於其中間不得故酤酒若有犯非菩薩行失四十二賢聖法不得犯能持否能六歎戒德受戒已過度四魔越三界苦從生至生不失此戒常隨行人乃至成佛回向案靈峯藕益大師依梵網瓔珞地持重定授菩薩法與此大同但悔罪之後應發四弘誓願三説歎戒德後應回向今亦可增入弘一隨分自誓受菩薩戒文析疑釋弘一我名仰啓十方一切如來已入大地諸菩薩衆我今欲於十方世界佛菩薩所誓受菩薩學處淨戒中謂律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學三説初釋自誓受自誓受者未得良師開自受故若五戒八戒自誓受者如南山羯磨疏等委明今約菩薩戒自誓受者如梵網經占察經等及瑜伽師地論所説梵網自受須見好相其他經論皆無好相之文各被一機隨宜用之授菩薩戒師具德如梵網義寂疏中略明師具德者應依師受若不爾者則開自誓梵網古迹記云問自受功德劣耶答不爾雖無現緣心猛利故如瑜伽師地論卷五十三云自受從他或自受或從師受若等心受亦如是持福德無別二釋隨分隨分受者唯受一二戒等若五戒八戒隨分受者見南山羯磨疏今約菩薩戒隨分受者見瓔珞本業經梵網古迹記及菩薩戒本宗要中據此經義廣為勸讚彼云隨其受者意樂所堪或受一戒或多皆得成戒名為菩薩乃至唯受一戒猶勝二乘一切功德菩薩一戒為度一切無一衆生不荷恩故今文空白之處應補寫受者名及隨分所受之戒名三釋今文改易及具列三聚名今文依瑜伽自誓受文稍有改易因須適合隨分受故問今既隨分受一二戒何以文中猶具列律儀戒攝善法戒饒益有情戒之三聚名耶答梵網賢首疏云攝三聚戒者有二義一若從勝為論各戒一一別配二若通辨每一戒中皆具三聚謂於此不犯律儀戒攝修彼對治之行攝善法攝以此二戒教他衆生令如自所作即為攝衆生戒云云今據疏中第二通辨之義雖受一戒即三聚攝亦無妨也附記劉蓮星慧日居士請寫隨分自誓受菩薩戒文將付影印為略析其疑義未能詳盡耳於時歲次鶉尾秋仲居茀林禪苑
